name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          extensions: none, dom, json, xml, simplexml, tokenizer
          coverage: none

      - name: Install OpenSSL dev (TLS build path)
        run: sudo apt-get update -qq && sudo apt-get install -y libssl-dev

      - name: Naming-consistency guard (no stray legacy references)
        run: ./scripts/check-no-seasclick.sh

      - name: Build extension (no TLS)
        run: |
          phpize
          ./configure --enable-clickhouse
          make -j$(nproc)

      - name: Run test suite
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/clickhouse.so"
          # run-tests.php exits non-zero on failures, zero on all-pass /
          # all-skip. Let its exit code drive the step.
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

      - name: Rebuild with TLS (verifies SSL build path)
        run: |
          make clean
          phpize --clean
          phpize
          ./configure --enable-clickhouse --enable-clickhouse-openssl
          make -j$(nproc)

  linux-zts:
    name: PHP ${{ matrix.php }} ZTS - Linux
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y re2c bison autoconf libssl-dev

      - name: Build PHP from source with --enable-zts
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          ./configure \
            --enable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-zts
          make -j$(nproc)
          make install

      - name: Build extension under ZTS
        run: |
          export PATH="/tmp/php-zts/bin:$PATH"
          phpize
          ./configure --enable-clickhouse --with-php-config=/tmp/php-zts/bin/php-config
          make -j$(nproc)

      - name: Run test suite under ZTS
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          export TEST_PHP_EXECUTABLE=/tmp/php-zts/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/clickhouse.so"
          /tmp/php-zts/bin/php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

  # Windows extension builds need the official PHP SDK + matching MSVC
  # toolset, not the autotools phpize/configure flow. The php-org
  # composite action below bundles SDK download, VS detection,
  # phpize / configure / nmake invocation, and a .dll smoke load.
  #
  # run-tests is enabled so the runner exercises extension load + class
  # registration + skip handling. Server-required phpts skip up-front
  # via clickhouse_skip_if_no_server() (which short-circuits on
  # PHP_OS_FAMILY === Windows). The offline surface smoke (tests/051)
  # actually runs and validates the public API and exception boundary.
  windows-matrix:
    name: Resolve Windows matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          php-version-list: '8.4'

  windows:
    name: Windows ${{ matrix.php-version }} ${{ matrix.ts }} ${{ matrix.arch }}
    needs: windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          run-tests: 'true'

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      # detect_leaks=0: vendored clickhouse-cpp creates a NonSecureSocketFactory
      #   per Client that's only freed at process exit; suppress until upstream
      #   releases a fix.
      # detect_odr_violation=0: clickhouse-cpp templates produce duplicate
      #   symbols across translation units, harmless but noisy.
      # exitcode=139: keep ASan abort on the conventional SIGSEGV exit code so
      #   run-tests.php classifies failures as crashes, not silent skips.
      ASAN_OPTIONS: exitcode=139:detect_odr_violation=0:detect_leaks=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y llvm clang re2c bison autoconf libssl-dev

      - name: Resolve clang runtime dir
        id: clang_rt
        run: echo "dir=$(clang -print-runtime-dir)" >> "$GITHUB_OUTPUT"

      - name: Build PHP with ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          # -shared-libasan: link ASan as a shared library so the dynamic
          # linker can resolve interceptors (notably __cxa_throw) across the
          # dlopen'd extension boundary. With static asan, the extension's
          # interceptor for __cxa_throw never finds the real libstdc++
          # symbol and ASan aborts the moment the wrapper throws.
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          # Match PHP's exact -fsanitize / -fno-sanitize / -shared-libasan
          # set so the runtime ABI lines up. Disable `function` (PHP's own
          # build does) and `vptr` (the vptr check needs
          # __ubsan_vptr_type_cache, which the dlopen'd extension can't
          # resolve against the host PHP's runtime).
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure --enable-clickhouse --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          # PHP and the extension are linked against the shared libasan/ubsan
          # runtimes, so the dynamic linker needs to find them. LD_LIBRARY_PATH
          # points at clang's runtime dir; no LD_PRELOAD is needed.
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/clickhouse.so"
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/
