name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config

      - name: Install OpenSSL dev (TLS build path)
        run: sudo apt-get update -qq && sudo apt-get install -y libssl-dev

      - name: Build extension (no TLS)
        run: |
          phpize
          ./configure --enable-clickhouse
          make -j$(nproc)

      - name: Run test suite
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/clickhouse.so"
          RESULT=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1)
          echo "$RESULT"
          FAILED=$(echo "$RESULT" | grep 'Tests failed' | grep -oP '\d+' | head -1)
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            exit 1
          fi

      - name: Rebuild with TLS (verifies SSL build path)
        run: |
          make clean
          phpize --clean
          phpize
          ./configure --enable-clickhouse --enable-clickhouse-openssl
          make -j$(nproc)

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      # Vendored clickhouse-cpp creates a NonSecureSocketFactory per Client
      # that's only freed at process exit. Disable leak detection rather
      # than chase upstream-internal bookkeeping.
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0:detect_leaks=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y llvm clang re2c bison autoconf libssl-dev

      - name: Build PHP with ASAN
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined" \
          CXXFLAGS="-fsanitize=address,undefined" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure --enable-clickhouse --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          export LD_PRELOAD=$(clang -print-file-name=libclang_rt.asan-x86_64.so)
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/clickhouse.so"
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt || true
          if grep -qP 'Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed under ASAN"
            exit 1
          fi
