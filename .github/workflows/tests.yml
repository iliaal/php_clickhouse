name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: phpize, php-config
          coverage: none
      - name: Install PIE build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bison libtool-bin
      - name: Download PIE
        run: |
          curl -fsSL -o /tmp/pie.phar https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /tmp/pie.phar
      - name: PIE build smoke (base, no TLS)
        run: |
          php /tmp/pie.phar repository:add path .
          php /tmp/pie.phar build iliaal/php_clickhouse:*@dev

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          extensions: none, dom, json, xml, simplexml, tokenizer
          coverage: none

      - name: Install OpenSSL dev (TLS build path)
        run: sudo apt-get update -qq && sudo apt-get install -y libssl-dev

      - name: Naming-consistency guard (no stray legacy references)
        run: ./scripts/check-no-seasclick.sh

      - name: Build extension (no TLS)
        run: |
          phpize
          ./configure --enable-clickhouse
          make -j$(nproc)

      - name: Verify ClickHouse is reachable (guard against silent all-skip)
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
        run: |
          # _clickhouse.inc SKIPIFs the whole suite when the native port is
          # unreachable, and run-tests.php exits 0 on an all-skip run -- so a
          # dead server would turn into a falsely-green lane. Fail fast if the
          # native protocol port is not accepting connections. (Auth failures
          # surface as test FAILs, not skips, so the port check is sufficient.)
          for i in $(seq 1 30); do
            if php -r 'exit(@fsockopen(getenv("CLICKHOUSE_HOST"), (int)getenv("CLICKHOUSE_PORT"), $e, $s, 2) ? 0 : 1);'; then
              echo "ClickHouse reachable on ${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}"; exit 0
            fi
            echo "waiting for ClickHouse native port... ($i)"; sleep 2
          done
          echo "ClickHouse not reachable on native port; failing to avoid a silent all-skip pass"; exit 1

      - name: Run test suite
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          # Stage the built .so into the system extension_dir so
          # run-tests.php's --EXTENSIONS-- clickhouse directive resolves
          # via the standard $ext_dir/clickhouse.so path on every PHP
          # version. Loading via -d extension=$(pwd)/modules/clickhouse.so
          # tripped PHP 7.4 dl.c's extension_dir prepend; overriding
          # extension_dir breaks the system dom/xml/phar/etc that
          # setup-php loads by basename.
          EXT_DIR=$(php -r 'echo ini_get("extension_dir");')
          sudo cp modules/clickhouse.so "$EXT_DIR/"
          export TEST_PHP_EXECUTABLE=$(which php)
          # run-tests.php exits non-zero on failures, zero on all-pass /
          # all-skip. Let its exit code drive the step.
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

      - name: Rebuild with TLS and run the TLS suite
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_TLS_PORT: 9440
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          set -e
          # Self-signed cert for the TLS lane. The phpt suite connects with
          # ssl_skip_verify=true, so CN/SAN are cosmetic; generated fresh so no
          # private key lives in the repo.
          mkdir -p "$RUNNER_TEMP/ch-certs"
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout "$RUNNER_TEMP/ch-certs/server.key" \
            -out "$RUNNER_TEMP/ch-certs/server.crt" -days 3650 \
            -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          chmod 644 "$RUNNER_TEMP/ch-certs/server.key" "$RUNNER_TEMP/ch-certs/server.crt"

          # The services: clickhouse container is plaintext-only, and GitHub
          # service containers start before any step runs -- they can't mount a
          # cert generated here. Run the TLS server manually instead. Native TLS
          # on 9440; plaintext HTTP exposed on host 8124 (container 8123) purely
          # as a version-agnostic readiness probe.
          docker run -d --name clickhouse-tls \
            --ulimit nofile=262144:262144 \
            -p 9440:9440 -p 8124:8123 \
            -e CLICKHOUSE_USER=test -e CLICKHOUSE_PASSWORD=test \
            -v "$RUNNER_TEMP/ch-certs":/etc/clickhouse-server/certs:ro \
            -v "$PWD/tests/tls/tls.xml":/etc/clickhouse-server/config.d/tls.xml:ro \
            clickhouse/clickhouse-server:latest

          # Rebuild the extension with TLS support while the server boots.
          make clean
          phpize --clean
          phpize
          ./configure --enable-clickhouse --enable-clickhouse-openssl
          make -j$(nproc)

          # Wait for the TLS server to be ready (plaintext HTTP ping on 8124).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8124/ping >/dev/null; then
              echo "TLS server ready"; break
            fi
            sleep 2
          done

          # Stage the TLS-enabled .so (over the no-TLS one) and run the TLS
          # round-trip test against 9440.
          EXT_DIR=$(php -r 'echo ini_get("extension_dir");')
          sudo cp modules/clickhouse.so "$EXT_DIR/"
          export TEST_PHP_EXECUTABLE=$(which php)
          # run-tests.php exits 0 on all-skip, so a skipped 027 (no TLS server /
          # no TLS build) would pass this step silently. Capture the summary and
          # require it actually ran (skipped=0) and passed (passed=1).
          out=$(php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/027.phpt 2>&1) || true
          echo "$out"
          skipped=$(echo "$out" | sed -n 's/.*Tests skipped *: *\([0-9]\{1,\}\).*/\1/p' | head -1)
          passed=$(echo "$out" | sed -n 's/.*Tests passed *: *\([0-9]\{1,\}\).*/\1/p' | head -1)
          if [ "$skipped" != "0" ]; then
            echo "::error::027.phpt was skipped -- TLS server unreachable or extension built without TLS"; exit 1
          fi
          if [ "$passed" != "1" ]; then
            echo "::error::027.phpt did not pass (passed=$passed)"; exit 1
          fi

          docker rm -f clickhouse-tls

  linux-zts:
    name: PHP ${{ matrix.php }} ZTS - Linux
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y re2c bison autoconf libssl-dev

      - name: Build PHP from source with --enable-zts
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          ./configure \
            --enable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-zts
          make -j$(nproc)
          make install

      - name: Build extension under ZTS
        run: |
          export PATH="/tmp/php-zts/bin:$PATH"
          phpize
          ./configure --enable-clickhouse --with-php-config=/tmp/php-zts/bin/php-config
          make -j$(nproc)

      - name: Run test suite under ZTS
        env:
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          EXT_DIR=$(/tmp/php-zts/bin/php -r 'echo ini_get("extension_dir");')
          mkdir -p "$EXT_DIR"
          cp modules/clickhouse.so "$EXT_DIR/"
          export TEST_PHP_EXECUTABLE=/tmp/php-zts/bin/php
          /tmp/php-zts/bin/php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

  # Windows extension builds need the official PHP SDK + matching MSVC
  # toolset, not the autotools phpize/configure flow. The php-org
  # composite action below bundles SDK download, VS detection,
  # phpize / configure / nmake invocation, and a .dll smoke load.
  #
  # run-tests is enabled so the runner exercises extension load + class
  # registration + skip handling. Server-required phpts skip up-front
  # via clickhouse_skip_if_no_server() (which short-circuits on
  # PHP_OS_FAMILY === Windows). The offline surface smoke (tests/051)
  # actually runs and validates the public API and exception boundary.
  windows-matrix:
    name: Resolve Windows matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          # Mirror the release-windows.yml matrix so the pre-tag gate builds
          # every toolset we ship. PHP 8.3 pins the VS2019 (vs16) toolset;
          # 8.4/8.5 use VS2022 (vs17). A clickhouse-cpp 2.6.2 construct that
          # compiled only under vs17 shipped a Windows-binary-less 0.8.6
          # because this gate built 8.4 alone -- keep all three so vs16
          # breakage blocks the release instead of surfacing post-tag.
          php-version-list: '8.3, 8.4, 8.5'

  windows:
    name: Windows ${{ matrix.php-version }} ${{ matrix.ts }} ${{ matrix.arch }}
    needs: windows-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.windows-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Build extension
        uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          run-tests: 'true'

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWORD: test
        options: >-
          --ulimit nofile=262144:262144
          --health-cmd "wget -qO- http://localhost:8123/ping || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      # detect_leaks=0: vendored clickhouse-cpp creates a NonSecureSocketFactory
      #   per Client that's only freed at process exit; suppress until upstream
      #   releases a fix.
      # detect_odr_violation=0: clickhouse-cpp templates produce duplicate
      #   symbols across translation units, harmless but noisy.
      # exitcode=139: keep ASan abort on the conventional SIGSEGV exit code so
      #   run-tests.php classifies failures as crashes, not silent skips.
      ASAN_OPTIONS: exitcode=139:detect_odr_violation=0:detect_leaks=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y llvm clang re2c bison autoconf libssl-dev

      - name: Resolve clang runtime dir
        id: clang_rt
        run: echo "dir=$(clang -print-runtime-dir)" >> "$GITHUB_OUTPUT"

      - name: Build PHP with ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          # -shared-libasan: link ASan as a shared library so the dynamic
          # linker can resolve interceptors (notably __cxa_throw) across the
          # dlopen'd extension boundary. With static asan, the extension's
          # interceptor for __cxa_throw never finds the real libstdc++
          # symbol and ASan aborts the moment the wrapper throws.
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build extension with ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          # Match PHP's exact -fsanitize / -fno-sanitize / -shared-libasan
          # set so the runtime ABI lines up. Disable `function` (PHP's own
          # build does) and `vptr` (the vptr check needs
          # __ubsan_vptr_type_cache, which the dlopen'd extension can't
          # resolve against the host PHP's runtime). Also disable
          # `pointer-overflow`: vendored LZ4 evaluates `dictionary + dictSize`
          # which is `NULL + 0` when no compression dictionary is set. This
          # is technically UB per C, harmless in practice, and a known
          # false positive that every LZ4 + UBSan integration suppresses.
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr,pointer-overflow -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr,pointer-overflow -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure --enable-clickhouse --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: test
          CLICKHOUSE_PASSWD: test
          NO_INTERACTION: 1
        run: |
          # PHP and the extension are linked against the shared libasan/ubsan
          # runtimes, so the dynamic linker needs to find them. LD_LIBRARY_PATH
          # points at clang's runtime dir; no LD_PRELOAD is needed.
          EXT_DIR=$(/tmp/php-asan/bin/php -r 'echo ini_get("extension_dir");')
          mkdir -p "$EXT_DIR"
          cp modules/clickhouse.so "$EXT_DIR/"
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/
