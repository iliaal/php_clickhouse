name: Release Windows binaries

# Triggered when a GitHub Release is published (manual or from a tag push
# via /release-ext). Builds the extension on every supported PHP version
# x architecture x thread-safety variant on Windows runners, then
# uploads each .dll as a release asset following the PIE-compatible
# naming convention (php_<ext>-<version>-<php_x.y>-<ts|nts>-vs17-<arch>.zip).
#
# Mirrors the Linux test matrix in build_matrix expansion so we ship
# binaries for every PHP version we claim to support. Tests are off in
# this lane -- the test workflow already validated the same arch/ts/php
# combinations on master.

on:
  release:
    types: [published]
  # Manual trigger. Two uses:
  #   - blank release_tag  -> build every lane, skip the upload job. This is the
  #     /release-ext Step 9.5 pre-tag gate: it exercises the exact source on the
  #     real Windows runners (vs16 for 8.3, vs17 for 8.4/8.5) before the tag is
  #     cut, so a toolset-specific break is caught pre-tag, not after.
  #   - release_tag set    -> build that tag's source and upload to it (backfill,
  #     e.g. when this workflow was added after the tag existed).
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to build + upload to. Blank = build-only validation (no upload).'
        required: false
        default: ''

jobs:
  matrix:
    name: Resolve Windows release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: matrix
        uses: php/php-windows-builder/extension-matrix@v1
        with:
          php-version-list: '8.3, 8.4, 8.5'

  build:
    name: Build ${{ matrix.php-version }} ${{ matrix.ts }} ${{ matrix.arch }}
    needs: matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      # release -> the tag; dispatch-with-tag -> that tag; blank -> triggering branch.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}
      - uses: php/php-windows-builder/extension@v1
        with:
          php-version: ${{ matrix.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          run-tests: 'false'

  release:
    name: Upload binaries to the release
    runs-on: ubuntu-latest
    needs: build
    # Upload only for a real release or a dispatch that names a tag; a blank
    # dispatch is build-only (the build job above still ran all lanes).
    if: github.event_name == 'release' || inputs.release_tag != ''
    steps:
      - uses: php/php-windows-builder/release@v1
        with:
          release: ${{ github.event.release.tag_name || inputs.release_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
